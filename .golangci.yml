version: "2"

run:
  timeout: 5m
  tests: true
  concurrency: 4
  go: "1.26.1"

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unused
  exclusions:
    generated: lax
    paths:
      - ".*\\.pb\\.go$"
      - ".*_grpc\\.pb\\.go$"
      - ".*_gen\\.go$"
      # goctl-generated files (cwd-agnostic so per-module lint also matches).
      # Editing these is prohibited; they are regenerated from .api / .proto.
      - "(.*/)?internal/types/.*\\.go$"
      - "(.*/)?internal/handler/routes\\.go$"
      - "(.*/)?internal/handler/.*_handler\\.go$"
      - ".worktrees/"
      - "vendor/"
    rules:
      - path: "_test\\.go$"
        linters:
          - errcheck
        text: "Error return value.*(Close|Rollback|Remove|RemoveAll|Write|Encode|Decode|Fprint|Fprintf|Fprintln|Print|Printf|Println)"
      - path: "(.*/)?internal/handler/.*_handler\\.go$"
        linters:
          - errcheck
        text: "Error return value of `httpx\\.Parse` is not checked"
      # go-zero uses custom JSON struct tags (json:",optional", json:",default=…")
      # that staticcheck's SA5008 doesn't recognise — suppress the false positives
      # only in config structs where these tags are idiomatic.
      - path: "(.*/)?internal/config/.*\\.go$"
        linters:
          - staticcheck
        text: "SA5008.*unknown JSON option"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ".*\\.pb\\.go$"
      - ".*_grpc\\.pb\\.go$"
      - ".*_gen\\.go$"
      # goctl-generated files (cwd-agnostic so per-module lint also matches).
      # Editing these is prohibited; they are regenerated from .api / .proto.
      - "(.*/)?internal/types/.*\\.go$"
      - "(.*/)?internal/handler/routes\\.go$"
      - "(.*/)?internal/handler/.*_handler\\.go$"
      - ".worktrees/"
      - "vendor/"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
