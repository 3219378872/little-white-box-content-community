S3Storage:
  Endpoint: "127.0.0.1:8333"
  AccessKey: "${S3_ACCESS_KEY}"
  SecretKey: "${S3_SECRET_KEY}"
  UseSSL: false
  Region: "us-east-1"
  Bucket: "xbh-media"
  PublicBaseURL: "http://127.0.0.1:8333/xbh-media"
MQ:
  NameServer: "${MQ_NAMESERVER}"
  GroupName: "media-service-group"
  Topic: "media-deleted"
  Tag: "default"
  ConsumeOrder: false
