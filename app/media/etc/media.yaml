Name: media.rpc
ListenOn: 0.0.0.0:9008
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: media.rpc
DataSource: "${DB_MEDIA}"

Redis:
  Host: 127.0.0.1:6379
  Pass: "${REDIS_PASS}"
  Type: node
  Key: media

S3Storage:
  Endpoint: "127.0.0.1:8333"
  AccessKey: "${S3_ACCESS_KEY}"
  SecretKey: "${S3_SECRET_KEY}"
  UseSSL: false
  Region: "us-east-1"
  Bucket: "xbh-media"
  PublicBaseURL: "http://127.0.0.1:8333/xbh-media"
  SkipBucketPolicy: true

Upload:
  MaxImageSize: 10485760
  MaxVideoSize: 104857600
  DefaultQuality: 85
  ThumbnailLongSide: 256
  TempDir: ""

Log:
  ServiceName: media.rpc
  Mode: console
  Encoding: json
  Level: info
  KeepDays: 30
  Compress: true
  Rotation: daily

MQ:
  NameServer: "${MQ_NAMESERVER}"
  GroupName: "media-producer-group"
  Retry: 3
  SendTimeout: 3000

Telemetry:
  Name: media.rpc
  Endpoint: ""
  Sampler: 0.1
  Batcher: otlphttp
