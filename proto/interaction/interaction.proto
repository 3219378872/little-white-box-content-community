syntax = "proto3";

package interaction;
option go_package = "xiaobaihe/interaction/pb";

// 互动服务
service InteractionService {
  // 点赞
  rpc Like(LikeReq) returns (LikeResp);
  // 取消点赞
  rpc Unlike(UnlikeReq) returns (UnlikeResp);
  // 检查是否点赞
  rpc CheckLiked(CheckLikedReq) returns (CheckLikedResp);
  // 获取点赞数
  rpc GetLikeCount(GetLikeCountReq) returns (GetLikeCountResp);

  // 收藏
  rpc Favorite(FavoriteReq) returns (FavoriteResp);
  // 取消收藏
  rpc Unfavorite(UnfavoriteReq) returns (UnfavoriteResp);
  // 检查是否收藏
  rpc CheckFavorited(CheckFavoritedReq) returns (CheckFavoritedResp);
  // 获取收藏列表
  rpc GetFavoriteList(GetFavoriteListReq) returns (GetFavoriteListResp);

  // 获取互动统计
  rpc GetCounts(GetCountsReq) returns (GetCountsResp);
}

// 点赞请求
message LikeReq {
  int64 user_id     = 1;
  int64 target_id   = 2;
  int32 target_type = 3; // 1: 帖子 2: 评论
}

// 点赞响应
message LikeResp {}

// 取消点赞请求
message UnlikeReq {
  int64 user_id     = 1;
  int64 target_id   = 2;
  int32 target_type = 3;
}

// 取消点赞响应
message UnlikeResp {}

// 检查是否点赞请求
message CheckLikedReq {
  int64 user_id     = 1;
  int64 target_id   = 2;
  int32 target_type = 3;
}

// 检查是否点赞响应
message CheckLikedResp {
  bool is_liked = 1;
}

// 获取点赞数请求
message GetLikeCountReq {
  int64 target_id   = 1;
  int32 target_type = 2;
}

// 获取点赞数响应
message GetLikeCountResp {
  int64 count = 1;
}

// 收藏请求
message FavoriteReq {
  int64 user_id = 1;
  int64 post_id = 2;
}

// 收藏响应
message FavoriteResp {}

// 取消收藏请求
message UnfavoriteReq {
  int64 user_id = 1;
  int64 post_id = 2;
}

// 取消收藏响应
message UnfavoriteResp {}

// 检查是否收藏请求
message CheckFavoritedReq {
  int64 user_id = 1;
  int64 post_id = 2;
}

// 检查是否收藏响应
message CheckFavoritedResp {
  bool is_favorited = 1;
}

// 获取收藏列表请求
message GetFavoriteListReq {
  int64 user_id   = 1;
  int32 page      = 2;
  int32 page_size = 3;
}

// 获取收藏列表响应
message GetFavoriteListResp {
  repeated int64 post_ids = 1;
  int64          total    = 2;
}

// 获取互动统计请求
message GetCountsReq {
  int64 target_id   = 1;
  int32 target_type = 2;
}

// 获取互动统计响应
message GetCountsResp {
  int64 like_count     = 1;
  int64 comment_count  = 2;
  int64 favorite_count = 3;
}
