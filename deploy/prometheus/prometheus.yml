global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['host.docker.internal:8888']

  - job_name: 'user-rpc'
    static_configs:
      - targets: ['host.docker.internal:9001']

  - job_name: 'content-rpc'
    static_configs:
      - targets: ['host.docker.internal:9002']

  - job_name: 'media-rpc'
    static_configs:
      - targets: ['host.docker.internal:9003']
