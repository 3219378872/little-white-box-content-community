version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: xbh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Xbh@MySQL2024!}
      MYSQL_DATABASE: xbh_user
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xbh-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: xbh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-Xbh@Redis2024!}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Xbh@Redis2024!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xbh-network

  # etcd 服务注册/发现
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: xbh-etcd
    restart: unless-stopped
    environment:
      - ETCD_DATA_DIR=/etcd
    command:
      - etcd
      - --name=default
#      - --advertise-client-urls=http://etcd:2379
      - --advertise-client-urls=http://127.0.0.1:2379
#      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
#      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
#      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-peer-urls=http://0.0.0.0:2380
#      - --initial-cluster=default=http://etcd:2380
      - --initial-cluster=default=http://127.0.0.1:2380
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://192.168.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xbh-network

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.3
    container_name: xbh-rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT: "-Duser.home=/home/rocketmq"
    command: sh mqnamesrv
    volumes:
      - rocketmq_namesrv_logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9876' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - xbh-network

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.1.3
    container_name: xbh-rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
      JAVA_OPT_EXT: "-Duser.home=/home/rocketmq -server -Xms512m -Xmx512m"
    command: >
      bash -c "
        chown -R rocketmq:rocketmq /home/rocketmq/store /home/rocketmq/logs &&
        su rocketmq -s /bin/bash -c '
          bash /home/rocketmq/scripts/init-topics.sh &
          sh mqbroker -c /home/rocketmq/rocketmq-5.1.3/conf/broker.conf -n rocketmq-namesrv:9876
        '
      "
    user: root
    volumes:
      - rocketmq_broker_logs:/home/rocketmq/logs
      - rocketmq_broker_store:/home/rocketmq/store
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.3/conf/broker.conf
      - ./rocketmq/init-topics.sh:/home/rocketmq/scripts/init-topics.sh:ro
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - xbh-network

  # RocketMQ Console
  rocketmq-console:
    image: styletang/rocketmq-console-ng
    container_name: xbh-rocketmq-console
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - xbh-network

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: xbh-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - xbh-network

  # Milvus 依赖的 etcd
  etcd-milvus:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: xbh-milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xbh-network

  # Milvus 依赖的 MinIO（端口映射到 9100 避免与业务 MinIO 冲突）
  minio-milvus:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: xbh-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xbh-network

  milvus:
    image: milvusdb/milvus:v2.2.8
    container_name: xbh-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd-milvus:2379
      MINIO_ADDRESS: minio-milvus:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    depends_on:
      etcd-milvus:
        condition: service_healthy
      minio-milvus:
        condition: service_healthy
    networks:
      - xbh-network

  # MinIO 对象存储（业务使用）
  minio:
    image: minio/minio:latest
    container_name: xbh-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Xbh@Minio2024!}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xbh-network

  # SeaweedFS（业务对象存储，替代 MinIO）
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: xbh-seaweedfs
    restart: unless-stopped
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8889:8888"
      - "8333:8333"
    command: >
      server -master -volume -filer -s3
      -s3.config=/etc/seaweedfs/s3_config.json
      -dir=/data
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3_config.json:/etc/seaweedfs/s3_config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - xbh-network

  # DTM 分布式事务
  dtm:
    image: yedf/dtm:latest
    container_name: xbh-dtm
    environment:
      IS_DOCKER: "1"
      Store_Driver: mysql
      Store_Host: 'localhost'
      Store_User: 'root'
      Store_Password: 'Xbh@MySQL2024!'
      Store_Port: 3306
      Store_Db: 'dtm'
    ports:
      - "36789:36789"
      - "36790:36790"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - xbh-network

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: xbh-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - xbh-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: xbh-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - xbh-network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: xbh-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-Xbh@Grafana2024!}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - xbh-network

  # Loki 日志收集
  loki:
    image: grafana/loki:latest
    container_name: xbh-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - xbh-network

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  rocketmq_namesrv_logs:
  rocketmq_broker_logs:
  rocketmq_broker_store:
  es_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
  minio_data:
  seaweedfs_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  xbh-network:
    driver: bridge
